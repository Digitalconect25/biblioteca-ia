name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      # `astro build` valida el esquema (Zod) de todas las fichas y falla si algo está mal.
      # `pagefind` genera el índice de búsqueda.
      - run: npm ci
      - run: npm run build
